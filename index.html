    <script>
      const cards = document.querySelectorAll(".server-card");
      let current = Math.floor(Math.random() * cards.length);
      cards[current].classList.add("active");
      document.getElementById("next").addEventListener("click", () => {
        cards[current].classList.remove("active");
        current = (current + 1) % cards.length;
        cards[current].classList.add("active");
      });
      document.getElementById("prev").addEventListener("click", () => {
        cards[current].classList.remove("active");
        current = (current - 1 + cards.length) % cards.length;
        cards[current].classList.add("active");
      });
    </script>

    <script>
      const CACHE_KEY = "duo_stats";
      const CACHE_TTL = 10 * 60 * 1000; // 10 minutes

      function renderStats(user) {
        console.log(user.courses);
        const streak = user.streak;
        const spanish = user.courses.find((c) => c.learningLanguage === "es");
        const chess = user.courses.find((c) => c.learningLanguage === "chess");
        document.getElementById("duolingo-stats").innerHTML = `
          <div class="duo-header">
            <img src="assets/Duolingo_Icon_Black.svg" />
            <span>Duolingo Stats</span>
          </div>
            <p>${streak} day streak</p>
            <p>🇪🇸 ${spanish.xp} Spanish XP</p>
      ${chess ? `<p>♟️ ${chess.xp} Chess XP</p>` : ""}`;
      }

      function fetchStats() {
        fetch(
          "https://duolingoapi.bigmurph2618.workers.dev/?username=leemo.jeemo",
        )
          .then((res) => res.json())
          .then((data) => {
            const user = data.users[0];
            localStorage.setItem(
              CACHE_KEY,
              JSON.stringify({ user, time: Date.now() }),
            );
            renderStats(user);
            twemoji.parse(document.getElementById("duolingo-stats"), {
              base: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/",
            });
          });
      }

      const cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        const { user, time } = JSON.parse(cached);
        renderStats(user);
        twemoji.parse(document.getElementById("duolingo-stats"), {
          base: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/",
        });
        if (Date.now() - time > CACHE_TTL) fetchStats();
      } else {
        fetchStats();
      }

      setInterval(fetchStats, CACHE_TTL);
    </script>
    <script>
      const WORKER_URL = "https://icy-shape-78e5.bigmurph2618.workers.dev/";
      function createTodoElement(todo) {
        const li = document.createElement("li");
        li.style.display = "flex";
        li.style.alignItems = "center";
        li.style.gap = "8px";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.addEventListener("change", async () => {
          const token = localStorage.getItem("auth_token");
          const res = await fetch(WORKER_URL, {
            method: "DELETE",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ id: todo.id }),
          });
          if (res.ok) {
            li.remove();
          } else {
            checkbox.checked = false;
            showToast("Failed to delete!");
          }
        });

        const span = document.createElement("span");
        span.textContent = todo.text;
        li.appendChild(checkbox);
        li.appendChild(span);
        return li;
      }

      fetch("https://icy-shape-78e5.bigmurph2618.workers.dev/")
        .then((res) => res.json())
        .then((todos) => {
          const list = document.getElementById("todo-list");
          todos.forEach((todo) => {
            list.appendChild(createTodoElement(todo));
          });
        });
    </script>

          headers: {

        if (modalMode === "password") {
          localStorage.setItem("auth_token", value);
          closeModal();
          openModal("todo");
        } else if (modalMode === "quote") {
          const author = modalInput2.value.trim();
          if (!author) return;
          closeModal();
          await fetch(WORKER_URL + "quotes", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ quote: value, author }),
          }).then((res) =>
            res.ok
              ? showToast("Quote submitted!")
              : showToast("Failed to submit quote!"),
          );
        } else {
          closeModal();
          await addTodo(value);
        }
      });

      document.getElementById("add-todo-btn").addEventListener("click", () => {
        const token = localStorage.getItem("auth_token");
        if (token) {
          openModal("todo");
        } else {
          openModal("password");
        }
      });

      const modalInput2 = document.getElementById("modal-input2");

      document
        .getElementById("submit-quote-btn")
        .addEventListener("click", () => {
          modalMode = "quote";
          modalTitle.textContent = "Submit a Quote";
          modalInput.type = "text";
          modalInput.placeholder = "Quote...";
          modalInput2.style.display = "block";
          modalInput.value = "";
          modalInput2.value = "";
          overlay.style.display = "flex";
          modalInput.focus();
        });

      function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.style.display = "block";
        setTimeout(() => {
          toast.style.display = "none";
        }, 3000);
      }
    </script>
